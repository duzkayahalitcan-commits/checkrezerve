# VPS için Nginx reverse proxy — checkrezerve.com
# Let's Encrypt: certbot --nginx -d checkrezerve.com -d www.checkrezerve.com

upstream nextjs_upstream {
    server app:3000;
    keepalive 64;
}

# HTTP → HTTPS yönlendirme (ACME challenge hariç)
server {
    listen 80;
    listen [::]:80;
    server_name checkrezerve.com www.checkrezerve.com;

    # Certbot ACME challenge — SSL yenileme için bu blok kalmalı
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS ana sunucu
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name checkrezerve.com www.checkrezerve.com;

    ssl_certificate     /etc/letsencrypt/live/checkrezerve.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/checkrezerve.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/checkrezerve.com/chain.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Güvenlik başlıkları
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Next.js statik dosyaları — uzun cache
    location /_next/static/ {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker — no-cache
    location /sw.js {
        proxy_pass http://nextjs_upstream;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Tüm diğer istekler
    location / {
        proxy_pass http://nextjs_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_cache_bypass  $http_upgrade;
    }
}
