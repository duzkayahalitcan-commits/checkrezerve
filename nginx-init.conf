# ─────────────────────────────────────────────────────────────────────────────
# nginx-init.conf — SADECE ilk SSL sertifikası alınırken kullanılır
# Certbot ACME challenge'a izin vermek için HTTP-only çalışır.
# Sertifika alındıktan sonra nginx.conf devreye girer.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name checkrezerve.com www.checkrezerve.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "OK - SSL bootstrap in progress";
        add_header Content-Type text/plain;
    }
}
