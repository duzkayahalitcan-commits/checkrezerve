version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# İzole ağ — tüm servisler bu ağda konuşur, dışa sadece nginx açıktır
# n8n ayrı bir compose stack'te 5678 portunu kullanır — çakışma yok
# ─────────────────────────────────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge
    name: app-net

volumes:
  certbot-www:   # ACME challenge dosyaları için paylaşılan volume
  certbot-conf:  # Let's Encrypt sertifikaları için kalıcı volume

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: checkrezerve:latest
    container_name: checkrezerve-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY:     ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY:             ${ANTHROPIC_API_KEY}
      SMS_PROVIDER:                  ${SMS_PROVIDER:-disabled}
      TWILIO_ACCOUNT_SID:            ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:             ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER:            ${TWILIO_FROM_NUMBER:-}
      NETGSM_USERCODE:               ${NETGSM_USERCODE:-}
      NETGSM_PASSWORD:               ${NETGSM_PASSWORD:-}
      NETGSM_MSGHEADER:              ${NETGSM_MSGHEADER:-}
      NODE_ENV:  production
      PORT:      3000
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    container_name: checkrezerve-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    networks:
      - app-net
    depends_on:
      app:
        condition: service_healthy

  # ─── Certbot: ilk kurulumda manuel çalıştırılır, sonra otomatik yeniler ───
  certbot:
    image: certbot/certbot:latest
    container_name: checkrezerve-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # Sürekli çalışarak her 12 saatte bir yenileme dener
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - app-net
