version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: checkrezerve:latest
    container_name: checkrezerve-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY:     ${SUPABASE_SERVICE_ROLE_KEY}
      ANTHROPIC_API_KEY:             ${ANTHROPIC_API_KEY}
      SMS_PROVIDER:                  ${SMS_PROVIDER:-disabled}
      TWILIO_ACCOUNT_SID:            ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN:             ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER:            ${TWILIO_FROM_NUMBER:-}
      NETGSM_USERCODE:               ${NETGSM_USERCODE:-}
      NETGSM_PASSWORD:               ${NETGSM_PASSWORD:-}
      NETGSM_MSGHEADER:              ${NETGSM_MSGHEADER:-}
      NODE_ENV:  production
      PORT:      3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: checkrezerve-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
